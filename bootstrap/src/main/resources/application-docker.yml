# Docker Environment Configuration
# 容器化部署环境配置 — Gateway 是无数据库的无状态服务

server:
  port: 8080

# Gateway backend service URLs (Docker DNS)
gateway:
  services:
    auth: http://auth-service:8001
    product: http://product-service:8002
    point: http://points-service:8003
    order: http://order-service:8004
  auth:
    validate-url: http://auth-service:8001/api/v1/internal/auth/validate
    timeout: 5s

# Spring Cloud Gateway Routes
spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Public Routes (no auth)
            - id: auth-public
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/public/auth/**
              metadata:
                auth-required: false

            - id: product-public
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/public/product/**
              metadata:
                auth-required: false

            - id: category-public
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/public/category/**
              metadata:
                auth-required: false

            - id: file-public
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/public/file/**
              metadata:
                auth-required: false

            - id: admin-category
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/admin/category/**
              metadata:
                auth-required: true

            - id: admin-product
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/admin/product/**
              metadata:
                auth-required: true

            - id: point-public
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/public/point/**
              metadata:
                auth-required: false

            - id: order-public
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/public/order/**
              metadata:
                auth-required: false

            # Private Routes (auth required)
            - id: auth-private
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/private/user/**
              metadata:
                auth-required: true

            # Admin Routes (auth + ADMIN role required)
            - id: auth-admin
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/admin/user/**
              metadata:
                auth-required: true

            - id: product-internal
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/internal/product/**
              metadata:
                auth-required: false

            - id: point-internal
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/internal/point/**
              metadata:
                auth-required: false

            # Protected Routes (auth required)
            - id: auth-protected
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/auth/**
              metadata:
                auth-required: true

            - id: product-protected
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/product/**
              metadata:
                auth-required: true

            - id: point-protected
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/point/**
              metadata:
                auth-required: true

            - id: order-protected
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/order/**
              metadata:
                auth-required: true

# Logging
logging:
  level:
    root: INFO
    com.awsome: INFO
